<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>RideCalc</title>
  </head>
  <body>
    <header>
      <h1>RideCalc</h1>

      <nav><button>Modo dia</button></nav>
    </header>
    <br />

    <main>
      <div>
        <h3>RESUMO DO DIA</h3>
        <h2>Quanto você realmente ganhou hoje?</h2>
        <p>Ganhos</p>

        <div>
          <label>Valor bruto recebido</label>
          <br>
          <input type="number" placeholder="R$0,00" />
        </div>

        <div>
          <label>Kilometros rodados</label>
          <br>
          <input type="number" placeholder="0.00" /> Km
        </div>

        <div>
          <label>Autonomia do veículo</label>
          <br>
          <input type="number" placeholder="0.00" /> Km/l
        </div>

        <div>
          <label>Valor por litro de combustível</label>
          <br>
          <input type="number" placeholder="R$0,00" />
        </div>

        <div>
          <p>Outros Gastos</p>
          <label>Manutenção (estimativa diária)</label>
          <br>
          <input type="number" placeholder="R$0,00" />
        </div>

        <div>
          <label>Horas trabalhadas</label>
          <br>
          <input type="number" placeholder="0.00" /> h
        </div>
      </div>
    </main>

  <div>
    <button>Calcular</button>
  </div>

  <div>
    <p>Custo com combustível</p>
    <p>R$250,00</p>
  </div>

  <div>
    <p>Custo total</p>
    <p>R$300,00</p>
  </div>

  <div>
    <p>Custo mínimo por Km</p>
    <p>R$0,85/km</p>
  </div>

  <div>
    <p>Ganho por hora</p>
    <p>R$32,50</p>
  </div>

  <div>
    <p>Lucro Líquido/dia</p>
    <p>R$400,00</p>
  </div>
  </body>
</html>
